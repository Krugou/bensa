name: ⛽ Bensa Price Scraper

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */2 * * *' # Run every 2 hours
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scraping-prices:
    name: 💸 Scraping-Prices
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Fuel Quality Check (Validate Secrets)
        run: |
          echo "🔎 Verifying required configuration for bot..."
          MISSING=0

          if [ -z "$FIREBASE_ADMIN_SDK" ]; then
            echo "❌ Error: FIREBASE_ADMIN_SDK is missing!"
            MISSING=$((MISSING + 1))
          fi

          if [ -z "$VITE_FIREBASE_PROJECT_ID" ]; then
            echo "❌ Error: VITE_FIREBASE_PROJECT_ID is missing!"
            MISSING=$((MISSING + 1))
          fi

          if [ $MISSING -gt 0 ]; then
            echo "🛑 Bot cannot start without proper credentials."
            exit 1
          fi
          echo "🚀 Bot is gassed up and ready to go!"
        env:
          FIREBASE_ADMIN_SDK: ${{ secrets.FIREBASE_ADMIN_SDK }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Bot
        run: npm run build:bot

      - name: Run Scraper
        run: npm run start:bot
        env:
          FIREBASE_ADMIN_SDK: ${{ secrets.FIREBASE_ADMIN_SDK }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Commit and push updated prices
        if: success()
        run: |
          git config --global user.name "Bensa Bot"
          git config --global user.email "bot@bensa.fi"
          git add web/public/api/prices.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): sync latest gas prices [skip ci]" && git pull origin main --rebase -Xtheirs && git push)
