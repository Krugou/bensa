name: ⛽ Bensa Factory

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 1' # Rebuild every Monday at 00:00 UTC

permissions:
  contents: write # for semantic-release & checkout
  pages: write # for gh-pages
  id-token: write # for oidc
  issues: write # for semantic-release
  pull-requests: write # for semantic-release

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  checking-the-pumps:
    name: ⛽ Checking-the-Pumps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Fuel Quality Check (Validate Secrets)
        run: |
          echo "🔎 Verifying required configuration..."
          MISSING=0

          declare -a SECRETS=(
            "VITE_FIREBASE_API_KEY"
            "VITE_FIREBASE_AUTH_DOMAIN"
            "VITE_FIREBASE_PROJECT_ID"
            "VITE_FIREBASE_STORAGE_BUCKET"
            "VITE_FIREBASE_MESSAGING_SENDER_ID"
            "VITE_FIREBASE_APP_ID"
            "VITE_FIREBASE_MEASUREMENT_ID"
            "FIREBASE_ADMIN_SDK"
          )

          for secret in "${SECRETS[@]}"; do
            if [ -z "${!secret}" ]; then
              echo "❌ Error: Secret '$secret' is missing or empty!"
              MISSING=$((MISSING + 1))
            else
              echo "✅ Secret '$secret' is present."
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo "🛑 Found $MISSING missing secrets. Please check your GitHub Repository Secrets."
            exit 1
          fi
          echo "🚀 All systems go! Configuration is valid."
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          FIREBASE_ADMIN_SDK: ${{ secrets.FIREBASE_ADMIN_SDK }}

      - name: Preparing the Station (Node.js)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Filling the Tanks (Dependencies)
        run: npm ci
      - name: Cleaning the Pumps (Lint All)
        run: npm run lint --if-present
        continue-on-error: true
      - name: Testing the Meters (Test Web)
        run: npm run test -w bensa-web -- --run
      - name: Processing the Fuel (Build Web)
        run: npm run build -w bensa-web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

      - name: Storing the Fuel (Upload Generic Artifact)
        uses: actions/upload-artifact@v7
        with:
          name: build-output
          path: './web/dist'

      - name: Pumping the Gas (Upload Pages Artifact)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v4
        with:
          path: './web/dist'

  building-the-scraper:
    name: 🤖 Building-the-Scraper
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Preparing the Garage
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Gassing up the Bot
        run: npm ci
      - name: Tuning the Engine (Build Bot)
        run: npm run build -w bensa-bot

      - name: Storing Scraper (Upload Artifact)
        uses: actions/upload-artifact@v7
        with:
          name: bot-dist
          path: './bot/dist'

  deploying-firestore:
    name: 🔥 Deploying-Firestore
    needs: [checking-the-pumps, building-the-scraper]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Deploy Firestore Rules
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only firestore:rules
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_ADMIN_SDK }}
          PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

  final-integration-test:
    name: 🧪 Final-Integration-Test
    needs: deploying-firestore
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Download Bot
        uses: actions/download-artifact@v8
        with:
          name: bot-dist
          path: './bot/dist'
      - name: Preparing the Station (Node.js)
        uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install Connectivity Dependencies
        run: npm install firebase-admin firebase dotenv tsx

      - name: Fuel Connectivity Test (Admin SDK)
        run: npx tsx bot/src/test-connection.ts
        env:
          FIREBASE_ADMIN_SDK: ${{ secrets.FIREBASE_ADMIN_SDK }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Client Connectivity Test (Client SDK)
        run: npx tsx web/src/test-firebase-client.ts
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID: ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}

  deploying-to-firebase:
    name: 🔥 Deploying-to-Firebase
    needs: final-integration-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
      - name: Receiving the Fuel
        uses: actions/download-artifact@v8
        with:
          name: build-output
          path: './web/dist'
      - name: Ignite the Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_ADMIN_SDK }}
          projectId: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          channelId: live

  deploying-to-pages:
    name: 🚀 Deploying-to-Pages
    needs: checking-the-pumps
    if: github.ref == 'refs/heads/main'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Driving to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  semantic-release:
    name: 📢 Semantic-Release
    needs: deploying-to-firebase
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
